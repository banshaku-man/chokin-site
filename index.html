<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>このままで大丈夫？100万円まで何年かかるか診断</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f7fb;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 12px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 10px;
}
</style>
</head>

<body>
<div class="container">

<h1>このままで大丈夫？100万円まで何年かかるか診断</h1>
<p>※「旅行資金」「引っ越し費用」など自由に使えます</p>

<!-- 年収選択 -->
<div class="card">
<h2>年収から簡単入力</h2>
<div class="grid">
<button onclick="setIncomeData(300)">300万</button>
<button onclick="setIncomeData(400)">400万</button>
<button onclick="setIncomeData(500)">500万</button>
<button onclick="setIncomeData(600)">600万</button>
</div>
<p>※平均データが自動入力されます</p>
</div>

<!-- 入力 -->
<div class="card">
<div class="grid">
<input id="income" placeholder="手取り">
<input id="goal" placeholder="目標額" value="1000000">

<input id="rent" placeholder="家賃">
<input id="food" placeholder="食費">
<input id="phone" placeholder="通信費">
<input id="utilities" placeholder="光熱費">

<input id="social" placeholder="交際費">
<input id="insurance" placeholder="保険">
<input id="investment" placeholder="投資">
<input id="other" placeholder="その他">

<input id="card" placeholder="カード支払い">
</div>

<button onclick="calculate()">診断する</button>
</div>

<!-- 結果 -->
<div class="card">
<h2>結果</h2>
<p id="result"></p>
<p id="message"></p>
</div>

</div>

<script>

function getVal(id){
  return Number(document.getElementById(id).value || 0);
}

function calculate(){

  const income = getVal("income");
  const goal = getVal("goal");

  const total =
    getVal("rent") +
    getVal("food") +
    getVal("phone") +
    getVal("utilities") +
    getVal("social") +
    getVal("insurance") +
    getVal("investment") +
    getVal("other") +
    getVal("card");

  const left = income - total;

  if(left <= 0){
    document.getElementById("result").innerText = "貯金できません";
    return;
  }

  const months = Math.ceil(goal / left);
  const years = Math.floor(months / 12);
  const m = months % 12;

  document.getElementById("result").innerText =
    "毎月の残り：" + left.toLocaleString() + "円 / 目標まで：" + years + "年" + m + "ヶ月";

  document.getElementById("message").innerText =
    "このペースでも達成できますが、少し見直すともっと早くなります";
}

function setIncomeData(level){

  if(level===300){
    setValues(200000,60000,25000,8000,10000,10000,8000,5000,15000,15000);
  }
  if(level===400){
    setValues(260000,70000,30000,8000,12000,15000,10000,10000,20000,20000);
  }
  if(level===500){
    setValues(330000,90000,35000,9000,13000,20000,12000,15000,25000,30000);
  }
  if(level===600){
    setValues(390000,100000,40000,10000,15000,25000,15000,20000,30000,40000);
  }

  calculate();
}

function setValues(i,r,f,p,u,s,ins,inv,o,c){
  document.getElementById("income").value=i;
  document.getElementById("rent").value=r;
  document.getElementById("food").value=f;
  document.getElementById("phone").value=p;
  document.getElementById("utilities").value=u;
  document.getElementById("social").value=s;
  document.getElementById("insurance").value=ins;
  document.getElementById("investment").value=inv;
  document.getElementById("other").value=o;
  document.getElementById("card").value=c;
}

</script>
</body>
</html>1000000
